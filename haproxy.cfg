global
    log stdout format raw local0
    maxconn 256

defaults
    log     global
    mode    http
    option  httplog
    option  redispatch
    timeout connect 1000ms
    timeout client  50000ms
    timeout server  50000ms
    timeout http-request 2000ms
    retries 2

frontend http_in
    bind *:3902

    # Extract bucket from first path segment
    http-request set-var(txn.bucket) path,field(2,/)
    http-request set-path %[path,regsub(^/[^/]+,)]

    # Set Host header to {bucket}.web.anurag.com.mm
    http-request set-header Host %[var(txn.bucket)].web.anurag.com.mm

    default_backend garage_web

frontend s3_api
    bind *:3900

    default_backend s3_api_backend

backend garage_web
    server node1 node1:3902 check inter 2s fall 1 rise 2
    server node2 node2:3902 check inter 2s fall 1 rise 2
    server node3 node3:3902 check inter 2s fall 1 rise 2
    server node4 node4:3902 check inter 2s fall 1 rise 2
    server node5 node5:3902 check inter 2s fall 1 rise 2
    server node6 node6:3902 check inter 2s fall 1 rise 2

backend s3_api_backend
    server node1 node1:3900 check inter 2s fall 1 rise 2
    server node2 node2:3900 check inter 2s fall 1 rise 2
    server node3 node3:3900 check inter 2s fall 1 rise 2
    server node4 node4:3900 check inter 2s fall 1 rise 2
    server node5 node5:3900 check inter 2s fall 1 rise 2
    server node6 node6:3900 check inter 2s fall 1 rise 2
