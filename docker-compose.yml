services:
  haproxy:
    image: haproxy:2.9-alpine
    container_name: haproxy
    restart: unless-stopped
    ports:
      - "3900:3900"
      - "3902:3902"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro

  node1:
    image: dxflrs/garage:v2.0.0
    container_name: node1
    restart: unless-stopped
    ports:
      - "3901:3901"
      - "3903:3903"
    volumes:
      - ./node1/garage.toml:/etc/garage.toml
      - ./node1/data:/var/lib/garage/data
      - ./node1/meta:/var/lib/garage/meta

  node2:
    image: dxflrs/garage:v2.0.0
    container_name: node2
    restart: unless-stopped
    ports:
      - "3910:3900"
      - "3911:3901"
      - "3912:3902"
      - "3913:3903"
    volumes:
      - ./node2/garage.toml:/etc/garage.toml
      - ./node2/data:/var/lib/garage/data
      - ./node2/meta:/var/lib/garage/meta

  node3:
    image: dxflrs/garage:v2.0.0
    container_name: node3
    restart: unless-stopped
    ports:
      - "3920:3900"
      - "3921:3901"
      - "3922:3902"
      - "3923:3903"
    volumes:
      - ./node3/garage.toml:/etc/garage.toml
      - ./node3/data:/var/lib/garage/data
      - ./node3/meta:/var/lib/garage/meta

  node4:
    image: dxflrs/garage:v2.0.0
    container_name: node4
    restart: unless-stopped
    ports:
      - "3930:3900"
      - "3931:3901"
      - "3932:3902"
      - "3933:3903"
    volumes:
      - ./node4/garage.toml:/etc/garage.toml
      - ./node4/data:/var/lib/garage/data
      - ./node4/meta:/var/lib/garage/meta

  node5:
    image: dxflrs/garage:v2.0.0
    container_name: node5
    restart: unless-stopped
    ports:
      - "3940:3900"
      - "3941:3901"
      - "3942:3902"
      - "3943:3903"
    volumes:
      - ./node5/garage.toml:/etc/garage.toml
      - ./node5/data:/var/lib/garage/data
      - ./node5/meta:/var/lib/garage/meta

  node6:
    image: dxflrs/garage:v2.0.0
    container_name: node6
    restart: unless-stopped
    ports:
      - "3950:3900"
      - "3951:3901"
      - "3952:3902"
      - "3953:3903"
    volumes:
      - ./node6/garage.toml:/etc/garage.toml
      - ./node6/data:/var/lib/garage/data
      - ./node6/meta:/var/lib/garage/meta

  webui:
    image: khairul169/garage-webui:1.1.0
    container_name: garage-webui
    restart: unless-stopped
    ports:
      - "3909:3909"
    environment:
      API_BASE_URL: "http://node1:3903"
      S3_ENDPOINT_URL: "http://node1:3900"
      API_ADMIN_KEY: "BiH69lKKBuAC2dAwwQvtzu24UNQrLGXrnlOiqAE1Qq4="
      AUTH_USER_PASS: "garage-admin:$$2y$$10$$iYzYOtO5jJhIJFpajM/56eDmWp6zr1QCimEYTDBd9rwRnOEpHa2Ny"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    depends_on:
      - node1
      - node2
      - node3

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus



volumes:
  prometheus_data:
  grafana_data: